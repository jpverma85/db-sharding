version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18  # Specify Node.js version
    commands:
      - echo Installing dependencies...
      - npm install

  pre_build:
    commands:
      - echo Running lint checks...
      - npm run lint

  build:
    commands:
      - echo Building the application...
      - npm run build

  post_build:
    commands:
      - echo Build completed successfully!

artifacts:
  files:
    - '**/*'             # Include all files
  discard-paths: no      # Preserve file structure
